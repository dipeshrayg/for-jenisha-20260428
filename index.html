<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/><title>For Jenisha</title><link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet"/><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#05000e;overflow:hidden}#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-family:"Caveat",cursive;font-size:.9rem;color:rgba(255,160,220,.3);letter-spacing:.12em;animation:bl 2.5s infinite}@keyframes bl{0%,100%{opacity:.25}50%{opacity:.7}}#fin{position:fixed;bottom:-200px;left:50%;transform:translateX(-50%);width:min(380px,92vw);background:rgba(10,0,20,.95);border-radius:18px;padding:26px 28px 22px;border:1px solid rgba(192,132,252,.15);transition:bottom 1.2s cubic-bezier(.34,1.4,.64,1);text-align:left;z-index:10}#fin.show{bottom:clamp(18px,4vh,50px)}.ft{font-family:"Caveat",cursive;font-size:.8rem;color:rgba(192,132,252,.45);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}.fm{font-family:"Caveat",cursive;font-size:clamp(1.1rem,3.5vw,1.4rem);color:#e9d5ff;line-height:1.82;white-space:pre-wrap}.ff{font-family:"Dancing Script",cursive;font-size:1.5rem;color:#c084fc;text-align:right;margin-top:14px}.fd{font-size:.68rem;color:rgba(192,132,252,.28);text-align:right;margin-top:2px;letter-spacing:.06em}</style></head><body><canvas id="c"></canvas><div id="hint">tap to scatter</div><div id="fin"><div class="ft">for jenisha</div><div class="fm" id="fm"></div><div class="ff">— Dipesh</div><div class="fd">April 28 · 2026</div></div><script>const MSG="This is what my head looks like.\nYou're in most of it.";const NAME="Jenisha";const DATE="April 28 \u00b7 2026";const PH=["i like you", "jenisha", "a lot", "really", "quite a bit", "yes you", "just you","ONLY you","My love","Mero unnecessary love","I dont give a f","I never loved you","I just needed a motivation","You dont mean anything","I am the Best","you are nothing","I am the creator","no one compares to me","I am on top","Fuck off"];const cv=document.getElementById("c"),ctx=cv.getContext("2d");let W=cv.width=window.innerWidth,H=cv.height=window.innerHeight;const CX=W/2,CY=H*.44,SC=Math.min(W*.018,H*.015);function heartPt(t){const x=16*Math.pow(Math.sin(t),3),y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));return{x:CX+x*SC,y:CY+y*SC};}const N=120;const particles=[];for(let i=0;i<N;i++){  const t=(i/N)*Math.PI*2,hp=heartPt(t);  const txt=PH[i%PH.length];  particles.push({tx:hp.x,ty:hp.y,x:Math.random()*W,y:Math.random()*H,    vx:0,vy:0,txt,alpha:0,scattered:false,hue:330+Math.random()*40});}let scattered=false,scatterT=0;cv.addEventListener("click",()=>{if(scattered){particles.forEach(p=>{p.tx=p.homeX;p.ty=p.homeY;p.scattered=false;});scattered=false;}else{particles.forEach(p=>{p.homeX=p.tx;p.homeY=p.ty;const ang=Math.random()*Math.PI*2,r=50+Math.random()*200;p.tx=CX+Math.cos(ang)*r;p.ty=CY+Math.sin(ang)*r;p.scattered=true;});scattered=true;}});cv.addEventListener("touchend",e=>{e.preventDefault();cv.dispatchEvent(new Event("click"));},{passive:false});let t=0,msgShown=false;function loop(){  t+=.016;  ctx.fillStyle="rgba(5,0,14,.18)";ctx.fillRect(0,0,W,H);  particles.forEach((p,i)=>{    p.alpha=Math.min(1,p.alpha+.018);    const dx=p.tx-p.x,dy=p.ty-p.y;    p.x+=dx*.08;p.y+=dy*.08;    const glow=.5+.5*Math.sin(t*2+i*.3);    ctx.save();ctx.globalAlpha=p.alpha*(.55+glow*.35);    ctx.font=`${Math.floor(9+Math.random()*.5)}px "Caveat",cursive`;    ctx.fillStyle=`hsl(${p.hue},85%,${70+glow*15}%)`;    ctx.shadowColor=`hsl(${p.hue},85%,75%)`;ctx.shadowBlur=6*glow;    ctx.fillText(p.txt,p.x,p.y);ctx.restore();});  if(!msgShown&&t>3.5){msgShown=true;showFin();}  requestAnimationFrame(loop);}function showFin(){  const el=document.getElementById("fin");el.classList.add("show");  const m=document.getElementById("fm");m.textContent="";let j=0;  const iv=setInterval(()=>{if(j>=MSG.length){clearInterval(iv);return;}m.textContent+=MSG[j++];},50);}loop();</script></body></html>
